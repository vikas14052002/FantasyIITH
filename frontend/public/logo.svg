<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="sg" x1="4" y1="4" x2="44" y2="47" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f5f5f0"/>
      <stop offset="100%" stop-color="#e8e8e0"/>
    </linearGradient>
    <linearGradient id="bg" x1="13" y1="15" x2="35" y2="37" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
    <clipPath id="ballClip">
      <circle cx="24" cy="26" r="12"/>
    </clipPath>
  </defs>
  <!-- Shield -->
  <path d="M24 3 L43 10 L43 27 C43 37.5 33.5 44.5 24 47 C14.5 44.5 5 37.5 5 27 L5 10 Z" fill="url(#sg)"/>
  <!-- Shield top highlight -->
  <path d="M24 5 L41 11.5 L41 14 C35 12 29 11 24 11 C19 11 13 12 7 14 L7 11.5 Z" fill="rgba(0,0,0,0.04)"/>
  <!-- Cricket ball -->
  <circle cx="24" cy="26" r="12" fill="url(#bg)"/>
  <!-- Seam lines clipped inside ball -->
  <g clip-path="url(#ballClip)">
    <line x1="12" y1="31" x2="36" y2="18" stroke="white" stroke-width="1.4" stroke-linecap="round"/>
    <line x1="12" y1="35" x2="36" y2="22" stroke="white" stroke-width="1.4" stroke-linecap="round"/>
  </g>
  <!-- Ball shine -->
  <ellipse cx="20" cy="21" rx="2.5" ry="1.5" fill="rgba(255,255,255,0.3)" transform="rotate(-20 20 21)"/>
</svg>
